<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Got it — Operative</title>
  <style>
    :root {
      --black: #0a0a0a;
      --surface: #111111;
      --gold: #F2A900;
      --white: #f5f5f5;
      --muted: rgba(245,245,245,.45);
      --fd: 'Space Grotesk', system-ui, sans-serif;
      --fb: 'Inter', system-ui, sans-serif;
    }
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--fb);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--fd);
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -.01em;
      color: var(--white);
      margin-bottom: 56px;
      text-decoration: none;
    }
    .logo svg { width: 28px; height: 28px; }
    .check {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(242,169,0,.12);
      border: 1px solid rgba(242,169,0,.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }
    .check svg { width: 28px; height: 28px; }
    h1 {
      font-family: var(--fd);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1.1;
      margin-bottom: 16px;
    }
    h1 span { color: var(--gold); }
    p {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 380px;
      margin: 0 auto 40px;
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gold);
      color: #0a0a0a;
      font-family: var(--fd);
      font-weight: 700;
      font-size: .9rem;
      letter-spacing: .04em;
      text-transform: uppercase;
      padding: 14px 28px;
      border-radius: 6px;
      text-decoration: none;
      transition: opacity .15s;
    }
    .back:hover { opacity: .86; }
  </style>
</head>
<body>
  <a href="/" class="logo">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 22V12L2 14L6 6L4 8L8 1L10 4.5L12 1L12 22Z" fill="#F2A900"/>
      <path d="M19 22V12L22 14L18 6L20 8L16 1L14 4.5L12 1L12 22Z" fill="#004D40"/>
    </svg>
    Operative
  </a>

  <div class="check">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 13L9 17L19 7" stroke="#F2A900" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <h1>We got it.<br><span>You'll hear from us.</span></h1>
  <p>We'll reach out within 24 hours. In the meantime, we're already looking into your business.</p>

  <a href="/" class="back">← Back to site</a>

</body>
</html>
