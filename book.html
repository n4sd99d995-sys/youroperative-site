<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Discovery Call | Operative</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #1A1710;
      color: #EAE4D8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 4rem;
    }
    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #C98B1A;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      text-decoration: none;
    }
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      max-width: 540px;
    }
    .label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #C98B1A;
      margin-bottom: 0.75rem;
    }
    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 0.75rem;
      letter-spacing: 0.02em;
    }
    p {
      color: #A09070;
      font-size: 1rem;
      line-height: 1.6;
    }
    .calendar-wrapper {
      width: 100%;
      max-width: 760px;
      background: #221E14;
      border: 1px solid rgba(201,139,26,0.2);
      border-radius: 12px;
      overflow: hidden;
      min-height: 600px;
    }
    iframe {
      width: 100%;
      min-height: 650px;
      border: none;
      display: block;
    }
    .back {
      margin-top: 2rem;
      color: #C98B1A;
      font-size: 0.875rem;
      text-decoration: none;
      opacity: 0.6;
    }
    .back:hover { opacity: 1; }
  </style>
</head>
<body>
  <a href="/" class="logo">Operative</a>

  <div class="header">
    <div class="label">Free Discovery Call</div>
    <h1>Let's Talk About Your Business</h1>
    <p>30 minutes. No pressure. We'll show you exactly what an AI growth system looks like for your trade.</p>
  </div>

  <div class="calendar-wrapper">
    <iframe src="https://api.leadconnectorhq.com/widget/booking/GpZAbfmqsE45jkY9d7PK" frameborder="0" scrolling="yes"></iframe>
  </div>

  <a href="/" class="back">← Back to home</a>
</body>
</html>
